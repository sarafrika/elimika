name: Semantic Release

on:
  workflow_run:
    workflows: ["Docker Build and Push"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release even if build workflow failed'
        required: false
        default: false
        type: boolean

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Only run if:
    # 1. Build workflow succeeded (for workflow_run events)
    # 2. Manual trigger (for workflow_dispatch events)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Release Context
        env:
          EVENT_NAME: ${{ github.event_name }}
          FORCE_RELEASE: ${{ github.event.inputs.force_release }}
          WORKFLOW_RUN_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          case "$EVENT_NAME" in
            "workflow_dispatch")
              echo "🚀 Manual Release Triggered"
              echo "Force release: $FORCE_RELEASE"
              ;;
            "workflow_run")
              echo "🔄 Automatic Release (triggered by successful Docker build)"
              echo "Triggering workflow: $WORKFLOW_RUN_NAME"
              echo "Workflow conclusion: $WORKFLOW_RUN_CONCLUSION"
              ;;
            *)
              echo "⚠️ Unexpected trigger: $EVENT_NAME"
              ;;
          esac
          echo ""

      - name: Skip Release Notification
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'success' }}
        env:
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          echo "⏭️ Release skipped - build workflow did not succeed"
          echo "Build workflow conclusion: $WORKFLOW_RUN_CONCLUSION"
          echo "💡 To force a release, use the 'Run workflow' button with 'Force release' option"
          exit 1
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.12.2 # or the version you're using
          run_install: true

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run release
