name: Docker Build and Push

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if only .github files changed'
        required: false
        default: false
        type: boolean
      build_reason:
        description: 'Reason for manual build (optional)'
        required: false
        default: 'Manual trigger'
        type: string

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.changes.outputs.should-build }}
      changed-files: ${{ steps.changes.outputs.changed-files }}
      trigger-type: ${{ steps.changes.outputs.trigger-type }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch full history to compare changes

      - name: Check for relevant changes
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BUILD_REASON: ${{ github.event.inputs.build_reason }}
          FORCE_BUILD: ${{ github.event.inputs.force_build }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          # Check if this is a manual workflow dispatch
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            echo "🚀 Manual workflow dispatch triggered"
            echo "Reason: $BUILD_REASON"
            echo "Force build: $FORCE_BUILD"
            echo "trigger-type=manual" >> $GITHUB_OUTPUT
            echo "should-build=true" >> $GITHUB_OUTPUT
            echo "changed-files=Manual trigger - no file changes to analyze" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "trigger-type=push" >> $GITHUB_OUTPUT
          
          # Get the list of files introduced by the push to main
          if [ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]; then
            changed_files=$(git ls-files)
          else
            changed_files=$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")
          fi
          
          echo "Changed files:"
          echo "$changed_files"
          echo "changed-files<<EOF" >> $GITHUB_OUTPUT
          echo "$changed_files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Check if only .github folder was changed
          non_github_changes=$(echo "$changed_files" | grep -v "^\.github/" | grep -v "^$" || true)
          
          if [ -z "$non_github_changes" ]; then
            echo "⏭️  Only .github folder was modified, skipping build"
            echo "should-build=false" >> $GITHUB_OUTPUT
          else
            echo "🔨 Application files were modified, proceeding with build"
            echo "should-build=true" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: check-changes
    if: needs.check-changes.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Build Context
        env:
          TRIGGER_TYPE: ${{ needs.check-changes.outputs.trigger-type }}
          BUILD_REASON: ${{ github.event.inputs.build_reason }}
          FORCE_BUILD: ${{ github.event.inputs.force_build }}
        run: |
          if [ "$TRIGGER_TYPE" == "manual" ]; then
            echo "🚀 Manual Build Triggered"
            echo "Reason: $BUILD_REASON"
            echo "Force build: $FORCE_BUILD"
          else
            echo "🔄 Push Build"
            echo "Changes detected on main, proceeding with build"
          fi

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}

      - name: Extract Application Version
        id: get_version
        run: echo "APP_VERSION=$(./gradlew properties --no-daemon | grep "version:" | awk '{print $2}')" >> $GITHUB_ENV

      - name: Build JAR file with Gradle
        run: ./gradlew clean build -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and tag Docker image with version
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          APP_VERSION: ${{ env.APP_VERSION }}
        run: |
          docker build -t "$DOCKERHUB_USERNAME/elimika:$APP_VERSION" .
          docker tag "$DOCKERHUB_USERNAME/elimika:$APP_VERSION" "$DOCKERHUB_USERNAME/elimika:latest"

      - name: Push Docker image to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          APP_VERSION: ${{ env.APP_VERSION }}
        run: |
          docker push "$DOCKERHUB_USERNAME/elimika:$APP_VERSION"
          docker push "$DOCKERHUB_USERNAME/elimika:latest"

      - name: Build Summary
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          APP_VERSION: ${{ env.APP_VERSION }}
          TRIGGER_TYPE: ${{ needs.check-changes.outputs.trigger-type }}
          BUILD_REASON: ${{ github.event.inputs.build_reason }}
        run: |
          echo "✅ Build completed successfully!"
          echo "📦 Docker images pushed:"
          echo "  - $DOCKERHUB_USERNAME/elimika:$APP_VERSION"
          echo "  - $DOCKERHUB_USERNAME/elimika:latest"
          echo ""
          if [ "$TRIGGER_TYPE" == "manual" ]; then
            echo "🚀 Trigger: Manual workflow dispatch"
            echo "📝 Reason: $BUILD_REASON"
          else
            echo "🔄 Trigger: Push to main"
          fi

  skip-build:
    needs: check-changes
    if: needs.check-changes.outputs.should-build == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Skip Build Notification
        env:
          CHANGED_FILES: ${{ needs.check-changes.outputs.changed-files }}
        run: |
          echo "⏭️  Build skipped - only .github changes detected"
          echo ""
          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo ""
          echo "💡 To force a build, you can:"
          echo "   - Make changes to application code"
          echo "   - Update version in build.gradle"
          echo "   - Modify source code or dependencies"
          echo "   - Use 'Run workflow' button with 'Force build' option"
