name: Deploy to Staging VPS

on:
  workflow_run:
    workflows: ["Docker Build and Push"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      deployment_reason:
        description: 'Reason for manual deployment (optional)'
        required: false
        default: 'Manual deployment'
        type: string

jobs:
  deploy:
    # For workflow_run: only deploy if the triggering workflow succeeded
    # For workflow_dispatch: always deploy
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Run Deployment over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEPLOYMENT_REASON: ${{ github.event.inputs.deployment_reason }}
          WORKFLOW_RUN_NAME: ${{ github.event.workflow_run.name }}
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USERNAME }}
          password: ${{ secrets.STAGING_SSH_PASSWORD }}
          envs: EVENT_NAME,DEPLOYMENT_REASON,WORKFLOW_RUN_NAME
          script: |
            set -euo pipefail
            cd /opt/sarafrika/elimika

            if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
              echo "🚀 Manual Deployment Triggered"
              echo "Reason: $DEPLOYMENT_REASON"
            else
              echo "🔄 Automatic Deployment (triggered by successful build)"
              echo "Triggering workflow: $WORKFLOW_RUN_NAME"
            fi
            echo ""

            echo "📥 Pulling backend image..."
            docker compose pull elimika

            echo "🚀 Recreating backend container..."
            docker compose up -d --no-deps elimika

            echo "🔍 Verifying the running container is the image we just pulled..."
            LATEST_ID=$(docker image inspect sarafrika/elimika:latest -f '{{.Id}}')
            RUNNING_ID=$(docker inspect elimika -f '{{.Image}}')
            echo "  latest  = $LATEST_ID"
            echo "  running = $RUNNING_ID"
            if [ "$LATEST_ID" != "$RUNNING_ID" ]; then
              echo "❌ Running image does not match the pulled :latest — deploy did not take effect"
              exit 1
            fi

            echo "🩺 Waiting for the backend to report healthy..."
            for i in $(seq 1 24); do
              STATUS=$(docker inspect elimika -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}')
              echo "  attempt $i/24: $STATUS"
              if [ "$STATUS" = "healthy" ]; then break; fi
              if [ "$STATUS" = "unhealthy" ]; then
                echo "❌ Backend reported unhealthy"; docker logs elimika --tail 60; exit 1
              fi
              sleep 5
            done

            STATUS=$(docker inspect elimika -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}')
            if [ "$STATUS" != "healthy" ]; then
              echo "❌ Backend did not become healthy within ~2 minutes"; docker logs elimika --tail 60; exit 1
            fi

            echo ""
            echo "✅ Deployment completed successfully — backend healthy on the latest image!"
            echo "🌍 Service available on port 30000"
